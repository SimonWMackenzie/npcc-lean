name: Lean proof and artifact integrity

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    name: Lean 4.30 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build formalization, reuse layer, and isolated tests
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          auto-config: false
          build: true
          build-args: NPCC Workspace Tests
          test: false
          lint: false
          use-mathlib-cache: true
          # The bundled leanchecker loads the complete multi-library environment in
          # one process and exhausts hosted runners. The fresh build above already
          # kernel-checks every declaration; the next step audits axioms and coverage.
          leanchecker: false

      - name: Verify claims, axioms, source coverage, and explorer sync
        working-directory: lean
        run: node pipeline/verify.mjs --lean
