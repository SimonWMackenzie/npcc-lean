name: Lean proof and artifact integrity

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    name: Lean 4.30 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build formalization, reuse layer, and isolated tests
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          auto-config: false
          build: true
          build-args: NPCC Workspace Tests
          test: false
          lint: false
          use-mathlib-cache: true
          leanchecker: false

      - name: Replay all project environments with leanchecker
        working-directory: lean
        shell: bash
        run: |
          lake_bin="$HOME/.elan/bin/lake"
          if [[ "$RUNNER_OS" == "Windows" ]]; then lake_bin="${lake_bin}.exe"; fi
          "$lake_bin" env leanchecker NPCC Workspace Tests

      - name: Verify claims, axioms, source coverage, and explorer sync
        working-directory: lean
        run: node pipeline/verify.mjs --lean
